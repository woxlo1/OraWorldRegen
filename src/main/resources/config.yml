# OraWorldRegen 設定ファイル
# ════════════════════════════════════════════════════════════
#  worlds.<name> : ワールドごとの設定
# ════════════════════════════════════════════════════════════
worlds:
  resources:
    multiverse-world-name: "resources"
    environment: NORMAL          # NORMAL / NETHER / THE_END
    world-type: NORMAL           # NORMAL / FLAT / AMPLIFIED / LARGE_BIOMES
    seed: ""                     # 空欄でランダム
    generator: ""                # 空欄でバニラ

    enabled: true
    countdown-seconds: 300       # 再生成前カウントダウン(秒)。0で即実行
    fallback-world: "world"      # 退避先ワールド

    # ── スケジュール ───────────────────────────────────────
    # 【human-readable 形式】（推奨）
    #   time:      発動時刻 (HH:mm)                  ※必須
    #   dayofweek: 曜日 (MONDAY〜SUNDAY)             ※省略=毎日
    #   day:       月内日付 (1〜31)                  ※省略=毎日
    #
    # 【cron 形式】（後方互換）
    #   cron: "分 時 日 月 曜日(0=日曜)"
    schedules:
      - time: "04:00"
        dayofweek: "SUNDAY"
      # - cron: "0 4 * * 0"   # cron形式の例（後方互換）

    # ── バックアップ ───────────────────────────────────────
    backup:
      enabled: false
      directory: "backups"
      max-count: 5

    # ── ワールドボーダー ───────────────────────────────────
    world-border:
      enabled: false
      size: 2000.0
      center-x: 0.0
      center-z: 0.0
      damage-amount: 0.2
      damage-buffer: 5.0
      warning-distance: 5
      warning-time: 15

    # ── 再生成後コマンド ───────────────────────────────────
    post-regen-commands:
      - "mv modify set gamemode survival {world}"

    # ── プレイヤー帰還 ─────────────────────────────────────
    return-players:
      enabled: true
      delay-seconds: 60

# ════════════════════════════════════════════════════════════
#  gates : 再生成後にワールドへ自動生成するゲート
#
#  ゲートはワールドのスポーン地点を基準に配置されます。
#  offset でスポーンからの相対位置を調整できます。
# ════════════════════════════════════════════════════════════
gates:
  resources-gate:
    world: "resources"           # ゲートを設置するワールド名

    facing: "south"              # ゲートの向き
                                 #   south / north : 東西に広がる（南北向きに立つ）
                                 #   east  / west  : 南北に広がる（東西向きに立つ）

    size:
      width: 2                   # ゲート内側の幅（ブロック数）
      height: 3                  # ゲート内側の高さ（ブロック数）

    offset:                      # スポーン地点からのずらし量（省略可、デフォルト 0）
      x: 3                       # 東方向に3ブロックずらす例
      y: 0                       # 地面レベルから変えない
      z: 0

    frame-block: "OBSIDIAN"      # フレームブロック
    portal-block: "WATER"        # 内側ブロック（WATER / LAVA / NETHER_PORTAL / AIR 等）
    destination: "w:world"       # テレポート先（Multiverse destination 形式）
    enabled: true
    owner: "OraWorldRegen"

# ════════════════════════════════════════════════════════════
#  settings : グローバル設定
# ════════════════════════════════════════════════════════════
settings:
  notify-at-seconds: [300, 120, 60, 30, 10, 5, 4, 3, 2, 1]
  timezone: "Asia/Tokyo"
  debug: false
